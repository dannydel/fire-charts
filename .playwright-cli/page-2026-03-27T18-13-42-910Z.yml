                    - paragraph [ref=e355]: Basic usage
                    - heading "Render a time-based line chart" [level=3] [ref=e356]
                  - paragraph [ref=e357]: Start with one list of typed records, map your X and Y values, and opt specific points into markers with a highlight selector.
                - code [ref=e359]: "@using FireCharts.Components @using FireCharts.Models @code { private IReadOnlyList<ServiceTrend> trend = [ new(new DateTime(2025, 1, 6), 118, false, null), new(new DateTime(2025, 1, 13), 126, false, null), new(new DateTime(2025, 1, 20), 131, true, \"Review queue spike\"), new(new DateTime(2025, 1, 27), 129, false, null) ]; private sealed record ServiceTrend(DateTime Date, double Value, bool Highlight, string? Note); } <FireLineChart TItem=\"ServiceTrend\" Title=\"Permit application volume\" Description=\"Weekly permit submissions\" Items=\"@trend\" XValueSelector=\"item => LineChartXValue.FromDateTime(item.Date)\" YValueSelector=\"item => item.Value\" LabelSelector=\"item => item.Date.ToString(\"\"MMM d\"\")\" HighlightSelector=\"item => item.Highlight\" Responsive=\"true\" Interpolation=\"LineInterpolationMode.Smooth\"> <TooltipTemplate Context=\"point\"> <div>@point.X.ToDateTime().ToString(\"MMM d\")</div> <div>@point.Y.ToString(\"F0\") submissions</div> @if (!string.IsNullOrWhiteSpace(point.Item.Note)) { <div>@point.Item.Note</div> } </TooltipTemplate> </FireLineChart>"
              - article [ref=e360]:
